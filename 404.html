<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0b0e">
    <title>404 — Lost in Space</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0b0e;
            --surface: #111117;
            --border: #1f1f2e;
            --amber: #00eeff;
            --electric: #39ff6e;
            --text: #e8e8f0;
            --muted: #5a5a72;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Mono', monospace;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            text-align: center;
        }

        /* Reusing your Noise Overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: 1000;
        }

        .container {
            position: relative;
            z-index: 2;
            padding: 2rem;
        }

        .error-code {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(8rem, 20vw, 15rem);
            line-height: 0.8;
            color: var(--amber);
            margin-bottom: 1rem;
            opacity: 0;
            animation: fadeUp 0.7s 0.2s forwards;
        }

        .error-tag {
            display: inline-block;
            font-size: .65rem;
            letter-spacing: .25em;
            text-transform: uppercase;
            color: var(--electric);
            border: 1px solid rgba(77, 240, 192, .3);
            padding: .3rem .8rem;
            border-radius: 2px;
            margin-bottom: 2rem;
            opacity: 0;
            animation: fadeUp 0.6s forwards;
        }

        h2 {
            font-family: 'DM Serif Display', serif;
            font-style: italic;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            color: var(--text);
            margin-bottom: 1rem;
            opacity: 0;
            animation: fadeUp 0.7s 0.4s forwards;
        }

        p {
            font-size: 0.82rem;
            color: var(--muted);
            max-width: 400px;
            margin: 0 auto 2.5rem;
            line-height: 1.8;
            opacity: 0;
            animation: fadeUp 0.7s 0.6s forwards;
        }

        .btn {
            font-family: 'DM Mono', monospace;
            font-size: .7rem;
            letter-spacing: .14em;
            text-transform: uppercase;
            text-decoration: none;
            padding: .75rem 1.6rem;
            border-radius: 3px;
            display: inline-block;
            transition: all .25s;
            background: var(--amber);
            color: #050a0b;
            font-weight: 600;
            opacity: 0;
            animation: fadeUp 0.7s 0.8s forwards;
        }

        .btn:hover {
            background: #33f5ff;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 238, 255, .35);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Reusing your glow effects for consistency */
        .glow {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0, 238, 255, .05) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="glow" style="top: -10%; left: -10%;"></div>
    <div class="glow" style="bottom: -10%; right: -10%;"></div>

    <div class="container">
        <div class="error-tag">Error Status: 404</div>
        <h1 class="error-code">404</h1>
        <h2>Nothing to see here.</h2>
        <p>The page you are looking for doesn't exist. It might have been moved, or perhaps it hasn't been built yet.</p>
        <a href="/" class="btn">Return to Homepage</a>
    </div>
</body>
</html>
